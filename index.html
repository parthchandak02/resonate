<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>resonate — earthquake ripples</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#120030;
  font-family:'Courier New', monospace;
}
canvas {
  display:block;
  width:100%; height:100%;
  touch-action:none;
}
#desc {
  position:fixed;
  bottom:24px;
  left:0; right:0;
  text-align:center;
  color:rgba(255,255,255,0.5);
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  pointer-events:none;
  z-index:10;
  text-shadow:0 0 8px rgba(255,0,255,0.3);
}
#data-bar {
  position:fixed;
  bottom:50px;
  left:0; right:0;
  text-align:center;
  color:rgba(255,255,255,0.6);
  font-size:10px;
  letter-spacing:2px;
  pointer-events:none;
  z-index:10;
  font-family:system-ui,sans-serif;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="desc">resonate · earthquake ripples · usgs feed</div>
<div id="databar">USGS Earthquakes · loading...</div>
<script>
// ─── Config ───────────────────────────────────────────────────────────
const C = {
  bg: '#120030',
  layer: '#1a0045',
  accent1: '#ff00ff', // magenta
  accent2: '#00ffff', // cyan
  accent3: '#ff6b35', // warm orange
  glow: '#ff00ff',
  text: 'rgba(255,255,255,0.6)',
  ringCount: 40,
  fadeTime: 4000,
  maxRings: 200,
  apiUrl: 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson',
};

// ─── Canvas setup ─────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// Touch guard
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

// ─── Ripple class ─────────────────────────────────────────────────────
let nextId = 0;
class Ripple {
  constructor(x, y, mag, locCode) {
    this.id = nextId++;
    this.x = x;
    this.y = y;
    this.mag = Math.max(0.1, Math.min(9, mag || 1));
    this.locCode = locCode || '--';
    this.maxRadius = 30 + (this.mag / 9) * 300; // 30–330px
    this.startOp = 0.5 + (this.mag / 9) * 0.45; // 0.50–0.95 (much higher)
    this.born = performance.now();
    this.strokeWidth = 2 + (this.mag / 9) * 6; // 2–8px
    this.pulsePhase = Math.random() * Math.PI * 2;
    // hues: warm cycle through palette
    const t = Math.random();
    if (t < 0.4) this.color = C.accent1; // magenta
    else if (t < 0.75) this.color = C.accent2; // cyan
    else this.color = C.accent3; // orange
  }

  get age() { return performance.now() - this.born; }
  get progress() { return Math.min(1, this.age / C.fadeTime); }
  get radius() { return this.progress * this.maxRadius; }
  get opacity() { return this.startOp * (1 - this.progress); } // linear fade, more visible longer
  get alive() { return this.progress < 1; }

  draw() {
    if (!this.alive) return;
    const r = this.radius;
    const op = this.opacity;
    if (op < 0.01 || r < 2) return;

    // Pulse: subtle radius modulation
    const pulse = 1 + 0.05 * Math.sin(this.pulsePhase + this.progress * Math.PI * 5);

    ctx.save();
    ctx.globalAlpha = op;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.strokeWidth;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 30;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * pulse, 0, Math.PI * 2);
    ctx.stroke();

    // Label: magnitude + location
    if (this.progress > 0.02 && this.progress < 0.85) {
      const labelAlpha = op * (1 - this.progress * 1.2);
      if (labelAlpha > 0.05) {
        ctx.save();
        ctx.globalAlpha = labelAlpha;
        ctx.fillStyle = this.color;
        ctx.font = '9px system-ui,sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'bottom';
        const label = 'M' + this.mag.toFixed(1) + ' ' + this.locCode;
        ctx.fillText(label, this.x, this.y - r * pulse - 6);
        ctx.restore();
      }
    }

    // Second ring: thinner, wider glow ring
    ctx.globalAlpha = op * 0.4;
    ctx.lineWidth = this.strokeWidth * 0.4;
    ctx.shadowBlur = 50;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * pulse * 1.12, 0, Math.PI * 2);
    ctx.stroke();

    // Center dot (bright flash point)
    if (this.progress < 0.1) {
      ctx.globalAlpha = op * (1 - this.progress * 10);
      ctx.fillStyle = '#ffffff';
      ctx.shadowBlur = 40;
      ctx.shadowColor = this.color;
      ctx.beginPath();
      ctx.arc(this.x, this.y, 4, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// ─── Ripple manager ───────────────────────────────────────────────────
let rings = [];
let apiFailed = false;
let lastFetchTime = 0;

// Extract a short location code from place string (last 2 chars or first 2 letters)
function shortLoc(place) {
  if (!place) return '--';
  const p = place.trim();
  // Try to get last word's first 2 letters (usually state code)
  const parts = p.split(', ');
  const last = parts[parts.length - 1] || p;
  const code = last.replace(/[^A-Za-z]/g, '').substring(0, 2).toUpperCase();
  return code || p.substring(0, 2).toUpperCase();
}

function spawnRipple(x, y, mag, locCode) {
  rings.push(new Ripple(x, y, mag, locCode));
  if (rings.length > C.maxRings) rings.splice(0, rings.length - C.maxRings);
}

function spawnRandom(mag) {
  const x = 80 + Math.random() * (W - 160);
  const y = 80 + Math.random() * (H - 160);
  spawnRipple(x, y, mag || 1 + Math.random() * 6, '--');
}

// ─── NOAA palette helper for colored ripples ──────────────────────────
function getColorFromMagnitude(mag) {
  const t = (mag - 1) / 8; // 0–1
  if (t < 0.33) return C.accent2; // cyan for small
  if (t < 0.66) return C.accent1; // magenta for medium
  return C.accent3; // orange for large
}

// ─── API Fetch ────────────────────────────────────────────────────────
async function fetchEarthquakes() {
  try {
    const res = await fetch(C.apiUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data || !data.features || !data.features.length) {
      throw new Error('No features');
    }
    // Spawn ripples from recent quakes
    const features = data.features.slice(0, 20);
    for (const f of features) {
      const coords = f.geometry.coordinates;
      const mag = f.properties.mag || 1;
      const place = f.properties.place || '';
      const locCode = shortLoc(place);
      const lng = coords[0];
      const lat = coords[1];
      // Map lat/lng to canvas position
      const x = ((lng + 180) / 360) * W;
      const y = ((90 - lat) / 180) * H;
      spawnRipple(x, y, mag, locCode);
    }
    apiFailed = false;
    lastFetchTime = performance.now();
  } catch (e) {
    console.warn('API failed, using random ripples:', e.message);
    apiFailed = true;
    // Spawn random ripples as fallback
    for (let i = 0; i < 12; i++) {
      spawnRandom(1 + Math.random() * 7);
    }
  }
}

// ─── Draw background ──────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // Subtle horizon glow
  const grad = ctx.createRadialGradient(cx, H * 0.85, 0, cx, H * 0.85, H * 0.6);
  grad.addColorStop(0, 'rgba(255,0,255,0.12)');
  grad.addColorStop(0.5, 'rgba(0,255,255,0.05)');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Scanlines (subtle, only in lower portion)
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  for (let y = H * 0.4; y < H; y += 4) {
    ctx.fillRect(0, Math.floor(y), W, 1);
  }
}

// ─── Draw grid lines (synthwave horizon feel) ─────────────────────────
function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,0,255,0.06)';
  ctx.lineWidth = 1;
  const spacing = 50;
  // Vertical
  for (let x = spacing; x < W; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  // Horizontal
  for (let y = spacing; y < H; y += spacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.restore();
}

// ─── Draw horizon glow ────────────────────────────────────────────────
function drawHorizonGlow() {
  const grad = ctx.createRadialGradient(cx, H * 0.75, 0, cx, H * 0.75, H * 0.5);
  grad.addColorStop(0, 'rgba(255,0,255,0.08)');
  grad.addColorStop(0.5, 'rgba(0,255,255,0.04)');
  grad.addColorStop(1, 'rgba(18,0,48,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ─── Warmup: spawn visible ripples so first frame isn't blank ────────
function warmup() {
  for (let i = 0; i < 5; i++) {
    const x = 100 + Math.random() * (W - 200);
    const y = 100 + Math.random() * (H - 200);
    const mag = 3 + Math.random() * 5;
    const r = new Ripple(x, y, mag, '--');
    r.born -= i * 800;
    rings.push(r);
  }
}

// ─── Fetch and schedule ───────────────────────────────────────────────
let fetchTimer = null;
function scheduleFetch() {
  fetchEarthquakes();
  fetchTimer = setInterval(fetchEarthquakes, 15000);
}

// ─── Main loop ────────────────────────────────────────────────────────
let spawnTimer = 0;
function loop(time) {
  drawBackground();

  // Continuously spawn random rings so canvas is never empty
  spawnTimer++;
  if (spawnTimer % 30 === 0) {
    spawnRandom(2 + Math.random() * 6);
  }

  // Clean dead rings
  rings = rings.filter(r => r.alive);

  // Draw rings
  for (const r of rings) r.draw();

  // Update data bar
  const dataEl = document.getElementById('data-bar');
  if (dataEl) {
    let updateText = '';
    if (lastFetchTime > 0) {
      const secs = Math.floor((performance.now() - lastFetchTime) / 1000);
      updateText = secs < 60 ? secs + 's ago' : Math.floor(secs / 60) + 'm ago';
    } else {
      updateText = 'fetching...';
    }
    dataEl.textContent = 'USGS Earthquakes · ' + rings.length + ' rings · updated ' + updateText;
  }

  requestAnimationFrame(loop);
}

// ─── Touch/Mouse interaction ──────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  spawnRipple(x, y, 2 + Math.random() * 5);
});

// ─── Init ─────────────────────────────────────────────────────────────
warmup();
scheduleFetch();
loop(0);
</script>
</body>
</html>
