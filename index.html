<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Resonate</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1a1518; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
/* ponytail: zero dependencies. pure Canvas 2D API. works offline. */

const C = {
  maxRings: 60,
  ringSpeed: 1.8,      // pixels per frame
  ringFade: 0.008,     // alpha fade per frame
  ringGrow: 4,         // stroke width grows with ring
  maxStroke: 3.5,
  minStroke: 0.3,
  hues: [350, 30, 200, 50, 280],  // rose, amber, teal, gold, violet
};

const BG = '#1a1518';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let rings = [];
let fc = 0;
let touchGuard = false;

class Ring {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.r = 0;
    this.maxR = Math.sqrt(W*W + H*H);
    this.hue = C.hues[Math.floor(Math.random()*C.hues.length)];
    this.phase = Math.random() * Math.PI * 2;
  }

  get alpha() { return Math.max(0, 1 - this.r / this.maxR - C.ringFade * fc); }
  get active() { return this.alpha > 0.01 && this.r < this.maxR; }

  draw() {
    const a = this.alpha;
    if (a <= 0) return;

    const w = C.minStroke + (this.r / this.maxR) * C.maxStroke;
    ctx.strokeStyle = `hsla(${this.hue}, 70%, ${55 + 20 * (1 - this.r/this.maxR)}%, ${a})`;
    ctx.lineWidth = w;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.stroke();

    // Inner ghost echo (subtle second ring inside)
    if (this.r > 20) {
      ctx.strokeStyle = `hsla(${this.hue}, 50%, 60%, ${a * 0.15})`;
      ctx.lineWidth = w * 0.4;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.r * 0.85, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
}

function addRing(x, y) {
  if (rings.length >= C.maxRings) rings.shift();
  rings.push(new Ring(x, y));
  // ponytail: single counter, no ring buffer needed at 60 cap
}

function draw() {
  fc++;
  // Semi-transparent background overlay for trail effect
  ctx.fillStyle = 'rgba(26, 21, 24, 0.12)';
  ctx.fillRect(0, 0, W, H);

  // Expand and draw rings
  for (let i = rings.length - 1; i >= 0; i--) {
    const ring = rings[i];
    ring.r += C.ringSpeed;
    ring.draw();
  }

  // Remove dead rings
  for (let i = rings.length - 1; i >= 0; i--) {
    if (!rings[i].active) rings.splice(i, 1);
  }

  // Small instruction text
  if (rings.length === 0) {
    ctx.fillStyle = 'rgba(200, 185, 165, 0.4)';
    ctx.font = '13px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('tap to resonate', W/2, H/2);
  }

  requestAnimationFrame(draw);
}

// ── Interactions ──
canvas.addEventListener('click', (e) => {
  if (touchGuard) { touchGuard = false; return; }
  addRing(e.clientX, e.clientY);
});
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  touchGuard = true;
  setTimeout(() => { touchGuard = false; }, 200);
  const t = e.touches[0];
  if (t) addRing(t.clientX, t.clientY);
}, { passive: false });
canvas.addEventListener('touchend', (e) => e.preventDefault(), { passive: false });

// ── Start with initial rings so it's not empty ──
addRing(W * 0.5, H * 0.5);
addRing(W * 0.4, H * 0.45);
addRing(W * 0.6, H * 0.55);
draw();
</script>
</body>
</html>
