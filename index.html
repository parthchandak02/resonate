<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>resonate — earthquake ripples</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#120030;
  font-family:'Courier New', monospace;
}
canvas {
  display:block;
  width:100%; height:100%;
  touch-action:none;
}
#desc {
  position:fixed;
  bottom:24px;
  left:0; right:0;
  text-align:center;
  color:rgba(255,255,255,0.5);
  font-size:13px;
  letter-spacing:3px;
  text-transform:uppercase;
  pointer-events:none;
  z-index:10;
  text-shadow:0 0 8px rgba(255,0,255,0.3);
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="desc">resonate · earthquake ripples · usgs feed</div>
<script>
// ─── Config ───────────────────────────────────────────────────────────
const C = {
  bg: '#120030',
  layer: '#1a0045',
  accent1: '#ff00ff', // magenta
  accent2: '#00ffff', // cyan
  accent3: '#ff6b35', // warm orange
  glow: '#ff00ff',
  text: 'rgba(255,255,255,0.6)',
  ringCount: 40,
  fadeTime: 3000,
  maxRings: 200,
  apiUrl: 'https://earthquake.usgs.gov/earthquakes/feed/v1.0/summary/all_hour.geojson',
};

// ─── Canvas setup ─────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
resize();
window.addEventListener('resize', resize);

// Touch guard
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });

// ─── Ripple class ─────────────────────────────────────────────────────
let nextId = 0;
class Ripple {
  constructor(x, y, mag) {
    this.id = nextId++;
    this.x = x;
    this.y = y;
    this.mag = Math.max(0.1, Math.min(9, mag || 1));
    this.maxRadius = 20 + (this.mag / 9) * 280; // 20–300px
    this.startOp = 0.25 + (this.mag / 9) * 0.55; // 0.25–0.80
    this.born = performance.now();
    this.strokeWidth = 1.5 + (this.mag / 9) * 5.5; // 1.5–7px
    this.pulsePhase = Math.random() * Math.PI * 2;
    // hues: warm cycle through palette
    const t = Math.random();
    if (t < 0.45) this.color = C.accent1; // magenta
    else if (t < 0.8) this.color = C.accent2; // cyan
    else this.color = C.accent3; // orange
  }

  get age() { return performance.now() - this.born; }
  get progress() { return Math.min(1, this.age / C.fadeTime); }
  get radius() { return this.progress * this.maxRadius; }
  get opacity() { return this.startOp * (1 - this.progress) * (1 - this.progress); }
  get alive() { return this.progress < 1; }

  draw() {
    if (!this.alive) return;
    const r = this.radius;
    const op = this.opacity;
    if (op < 0.002 || r < 1) return;

    // Pulse: subtle radius modulation
    const pulse = 1 + 0.04 * Math.sin(this.pulsePhase + this.progress * Math.PI * 6);

    ctx.save();
    ctx.globalAlpha = op;
    ctx.strokeStyle = this.color;
    ctx.lineWidth = this.strokeWidth;
    ctx.shadowColor = this.color;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * pulse, 0, Math.PI * 2);
    ctx.stroke();

    // Second ring: thinner, wider glow ring
    ctx.globalAlpha = op * 0.3;
    ctx.lineWidth = this.strokeWidth * 0.5;
    ctx.shadowBlur = 40;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * pulse * 1.08, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

// ─── Ripple manager ───────────────────────────────────────────────────
let rings = [];
let apiFailed = false;

function spawnRipple(x, y, mag) {
  rings.push(new Ripple(x, y, mag));
  if (rings.length > C.maxRings) rings.splice(0, rings.length - C.maxRings);
}

function spawnRandom(mag) {
  const x = 80 + Math.random() * (W - 160);
  const y = 80 + Math.random() * (H - 160);
  spawnRipple(x, y, mag || 1 + Math.random() * 6);
}

// ─── NOAA palette helper for colored ripples ──────────────────────────
function getColorFromMagnitude(mag) {
  const t = (mag - 1) / 8; // 0–1
  if (t < 0.33) return C.accent2; // cyan for small
  if (t < 0.66) return C.accent1; // magenta for medium
  return C.accent3; // orange for large
}

// ─── API Fetch ────────────────────────────────────────────────────────
async function fetchEarthquakes() {
  try {
    const res = await fetch(C.apiUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data || !data.features || !data.features.length) {
      throw new Error('No features');
    }
    // Spawn ripples from recent quakes
    const features = data.features.slice(0, 20);
    for (const f of features) {
      const coords = f.geometry.coordinates;
      const mag = f.properties.mag || 1;
      const lng = coords[0];
      const lat = coords[1];
      // Map lat/lng to canvas position
      const x = ((lng + 180) / 360) * W;
      const y = ((90 - lat) / 180) * H;
      spawnRipple(x, y, mag);
    }
    apiFailed = false;
  } catch (e) {
    console.warn('API failed, using random ripples:', e.message);
    apiFailed = true;
    // Spawn random ripples as fallback
    for (let i = 0; i < 12; i++) {
      spawnRandom(1 + Math.random() * 7);
    }
  }
}

// ─── Draw background ──────────────────────────────────────────────────
function drawBackground() {
  ctx.fillStyle = C.bg;
  ctx.fillRect(0, 0, W, H);

  // Scanlines
  ctx.fillStyle = 'rgba(255,255,255,0.035)';
  for (let y = 0; y < H; y += 4) {
    ctx.fillRect(0, y, W, 1);
  }
}

// ─── Draw grid lines (synthwave horizon feel) ─────────────────────────
function drawGrid() {
  ctx.save();
  ctx.strokeStyle = 'rgba(255,0,255,0.06)';
  ctx.lineWidth = 1;
  const spacing = 50;
  // Vertical
  for (let x = spacing; x < W; x += spacing) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x, H);
    ctx.stroke();
  }
  // Horizontal
  for (let y = spacing; y < H; y += spacing) {
    ctx.beginPath();
    ctx.moveTo(0, y);
    ctx.lineTo(W, y);
    ctx.stroke();
  }
  ctx.restore();
}

// ─── Draw horizon glow ────────────────────────────────────────────────
function drawHorizonGlow() {
  const grad = ctx.createRadialGradient(cx, H * 0.75, 0, cx, H * 0.75, H * 0.5);
  grad.addColorStop(0, 'rgba(255,0,255,0.08)');
  grad.addColorStop(0.5, 'rgba(0,255,255,0.04)');
  grad.addColorStop(1, 'rgba(18,0,48,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ─── Warmup: spawn fake ripples so first frame isn't blank ────────────
function warmup() {
  for (let i = 0; i < 3; i++) {
    const x = 100 + Math.random() * (W - 200);
    const y = 100 + Math.random() * (H - 200);
    const mag = 2 + Math.random() * 5;
    const r = new Ripple(x, y, mag);
    // offset their birth times so they're at different stages
    r.born -= i * 900;
    rings.push(r);
  }
}

// ─── Fetch and schedule ───────────────────────────────────────────────
let fetchTimer = null;
function scheduleFetch() {
  fetchEarthquakes();
  fetchTimer = setInterval(fetchEarthquakes, 15000);
}

// ─── Main loop ────────────────────────────────────────────────────────
function loop(time) {
  drawBackground();
  drawGrid();
  drawHorizonGlow();

  // Clean dead rings
  rings = rings.filter(r => r.alive);

  // Draw rings
  for (const r of rings) r.draw();

  // Show count info
  ctx.save();
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.font = '11px "Courier New", monospace';
  ctx.fillText('rings: ' + rings.length, 12, 24);
  ctx.restore();

  requestAnimationFrame(loop);
}

// ─── Touch/Mouse interaction ──────────────────────────────────────────
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  spawnRipple(x, y, 2 + Math.random() * 5);
});

// ─── Init ─────────────────────────────────────────────────────────────
warmup();
scheduleFetch();
loop(0);
</script>
</body>
</html>
